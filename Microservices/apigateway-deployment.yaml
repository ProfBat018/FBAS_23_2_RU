apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apigateway
  template:
    metadata:
      labels:
        app: apigateway
    spec:
      containers:
        - name: apigateway
          image: nightcall018/microservicesapp:gateway
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app-volume
              mountPath: /app/data
      volumes:
        - name: app-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: apigateway
  namespace: microservices
spec:
  type: NodePort
  selector:
    app: apigateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30001
